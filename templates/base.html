<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI组织转型人才能力测评{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        {% block style %}{% endblock %}
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-6">
                    <a href="/" class="text-lg font-bold text-blue-600">🏠 AI能力测评</a>
                    {% if session.user_id %}
                    <div class="flex items-center gap-4 text-sm">
                        <a href="/dashboard" class="text-gray-600 hover:text-blue-600">个人中心</a>
                        <a href="/assessment" class="text-gray-600 hover:text-blue-600">开始测评</a>
                        {% if session.is_tenant_admin or session.is_admin %}
                        <a href="/tenant-admin" class="text-purple-600 hover:text-purple-800 font-medium">🏢 管理后台</a>
                        {% endif %}
                    </div>
                    {% endif %}
                </div>
                <div class="flex items-center gap-4">
                    {% if session.user_id %}
                    <span class="text-sm text-gray-500">{{ session.username }}</span>
                    <a href="/logout" class="text-sm text-red-600 hover:text-red-800">退出</a>
                    {% else %}
                    <a href="/login" class="text-sm text-blue-600 hover:text-blue-800">登录</a>
                    <a href="/register" class="text-sm text-blue-600 hover:text-blue-800">注册</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </div>
    
    {% block scripts %}{% endblock %}
</body>
</html>
