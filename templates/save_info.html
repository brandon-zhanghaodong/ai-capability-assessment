<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保存信息 - AI组织转型人才能力测评</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1F4E79 0%, #2E75B6 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-lg w-full mx-4">
        <div class="text-center mb-8">
            <div class="inline-block px-4 py-2 bg-green-100 text-green-800 rounded-full text-sm font-medium mb-4">
                ✓ 测评完成
            </div>
            <h1 class="text-3xl font-bold text-gray-800">保存您的信息</h1>
            <p class="text-gray-600 mt-2">填写信息后可生成完整报告并保存记录</p>
        </div>
        
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <form id="saveForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">姓名</label>
                    <input type="text" name="name"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="请输入您的姓名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">部门</label>
                    <input type="text" name="department"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="如：人力资源部">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">岗位</label>
                    <input type="text" name="position"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="如：HR经理">
                </div>
                <div class="flex space-x-4">
                    <a href="/dashboard" class="flex-1 px-6 py-3 border border-gray-300 text-gray-600 rounded-lg text-center hover:bg-gray-50 transition-colors">
                        稍后填写
                    </a>
                    <button type="submit" 
                            class="flex-1 gradient-bg text-white py-3 rounded-lg font-medium hover:opacity-90 transition-opacity">
                        生成报告
                    </button>
                </div>
            </form>
        </div>
    </div>

<script>
document.getElementById('saveForm').addEventListener('submit', function(e) {
    e.preventDefault();
    this.submit();
});
</script>
</body>
</html>
