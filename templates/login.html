<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI组织转型人才能力测评</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1F4E79 0%, #2E75B6 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <div class="inline-block px-4 py-2 bg-blue-100 text-blue-800 rounded-full text-sm font-medium mb-4">
                AI组织转型实战框架
            </div>
            <h1 class="text-3xl font-bold text-gray-800">用户登录</h1>
        </div>
        
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="请输入用户名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="请输入密码">
                </div>
                <div id="errorMsg" class="text-red-500 text-sm text-center hidden"></div>
                <button type="submit" 
                        class="w-full gradient-bg text-white py-3 rounded-lg font-medium hover:opacity-90 transition-opacity">
                    登录
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-500 text-sm">
                    ⚠️ <strong>账号由管理员分配</strong>，请联系管理员创建账号后再登录
                </p>
            </div>
            
            <div class="mt-6 text-center">
                <a href="/" class="text-gray-500 text-sm hover:text-gray-700">返回首页</a>
            </div>
        </div>
    </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = {
        username: formData.get('username'),
        password: formData.get('password')
    };
    
    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await response.json();
        
        if (result.status === 'success') {
            window.location.href = result.redirect;
        } else {
            document.getElementById('errorMsg').textContent = result.message;
            document.getElementById('errorMsg').classList.remove('hidden');
        }
    } catch (error) {
        console.error('Error:', error);
    }
});
</script>
</body>
</html>
