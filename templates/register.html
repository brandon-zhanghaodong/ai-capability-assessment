<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AI组织转型人才能力测评</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1F4E79 0%, #2E75B6 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <div class="inline-block px-4 py-2 bg-blue-100 text-blue-800 rounded-full text-sm font-medium mb-4">
                AI组织转型实战框架
            </div>
            <h1 class="text-3xl font-bold text-gray-800">创建账号</h1>
            <p class="text-gray-600 mt-2">注册后可保存测评记录，获取完整报告</p>
        </div>
        
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <form id="registerForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名 <span class="text-red-500">*</span></label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="设置用户名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码 <span class="text-red-500">*</span></label>
                    <input type="password" name="password" required minlength="6"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="至少6位密码">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">公司/组织名称</label>
                    <input type="text" name="company"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="选填，便于团队管理">
                </div>
                <div id="errorMsg" class="text-red-500 text-sm text-center hidden"></div>
                <button type="submit" 
                        class="w-full gradient-bg text-white py-3 rounded-lg font-medium hover:opacity-90 transition-opacity">
                    注册
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600 text-sm">
                    已有账号？ <a href="/login" class="text-blue-600 hover:underline">立即登录</a>
                </p>
            </div>
            
            <div class="mt-6 text-center">
                <a href="/" class="text-gray-500 text-sm hover:text-gray-700">返回首页</a>
            </div>
        </div>
    </div>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = {
        username: formData.get('username'),
        password: formData.get('password'),
        company: formData.get('company')
    };
    
    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await response.json();
        
        if (result.status === 'success') {
            window.location.href = result.redirect;
        } else {
            document.getElementById('errorMsg').textContent = result.message;
            document.getElementById('errorMsg').classList.remove('hidden');
        }
    } catch (error) {
        console.error('Error:', error);
    }
});
</script>
</body>
</html>
